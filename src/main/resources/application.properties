# =============================================================
#  UniHive — Application Configuration
# =============================================================

# Application name
spring.application.name=UniHive

# =============================================================
#  MongoDB Atlas Configuration
#  Replace the URI below with your actual Atlas connection string.
#  Format: mongodb+srv://<username>:<password>@<cluster>.mongodb.net/<database>
# =============================================================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# =============================================================
#  WebSocket Server Configuration
#  Port on which the embedded ChatServer listens.
#  Change this if 8887 is already in use on your machine.
# =============================================================
unihive.websocket.port=${PORT:8887}
unihive.websocket.host=localhost

# =============================================================
#  Spring Boot — suppress web server (CLI application)
# =============================================================
spring.main.web-application-type=none

# =============================================================
#  Logging — reduce noise for a cleaner console experience
# =============================================================
logging.level.root=WARN
logging.level.com.unihive=INFO
logging.level.org.springframework.data.mongodb=WARN
logging.level.org.java_websocket=WARN

# Disable most Spring Boot logs
logging.level.root=ERROR

# Disable your application's INFO logs
logging.level.com.unihive=ERROR


spring.main.banner-mode=off


